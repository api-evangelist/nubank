aid: nubank
name: Nu (Nubank)
description: >-
  Nu Holdings (Nubank) is Latin America's largest digital bank, with tens of
  millions of customers across Brazil, Mexico, and Colombia. Its core
  product surface - credit card, account, lending, investments, and
  insurance - is consumer-facing through the Nu mobile app, and Nubank does
  not publish a general-purpose public developer portal. Nubank participates
  in Brazil's Open Finance (Open Banking Brasil) regime, which standardises
  consent-driven access to account, transaction, and payment-initiation
  APIs for authorised third parties; Nubank's Open Finance endpoints are
  registered with the Brazilian Central Bank's directory. For merchant
  acceptance, Nubank operates NuPay for Business, a REST API for checkout
  payments, refunds, OAuth2/CIBA-based authorization, beneficiary
  management, and webhook event notifications, hosted at api.spinpay.com.br.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
access: 3rd-Party
position: Producer
