  - Credit Cards
  - Open Finance
  - Payments
  - Brazil
  - Mexico
  - Colombia
  - Latin America
url: >-
  https://raw.githubusercontent.com/api-evangelist/nubank/refs/heads/main/apis.yml
specificationVersion: '0.20'
apis:
  - aid: nubank:open-finance
    name: Nubank Open Finance Brasil API
    description: >-
      Open Finance Brasil endpoints registered by Nubank in the Central Bank
      directory. Provides consent-driven access to account, credit-card,
      loan, and payment-initiation data for authorised TPPs under the
      Brazilian Open Finance regulatory framework.
    humanURL: https://openfinance.dev.br/provider/Nubank
    baseURL: https://openbanking.nubank.com.br
    tags:
      - Open Finance
      - Open Banking
      - Consent
      - Brazil
    properties:
      - type: Documentation
        url: https://openfinance.dev.br/provider/Nubank
  - aid: nubank:nupay-checkout
    name: NuPay for Business - Checkout API
    description: >-
      REST API for creating and managing NuPay checkout orders, querying
      payment status, cancelling unpaid orders, and processing refunds for
      completed transactions. Built for Brazilian merchants accepting NuPay
      as a payment method.
    humanURL: https://docs.nupaybusiness.com.br/
    baseURL: https://api.spinpay.com.br
    tags:
      - Checkout
      - Payments
      - Refunds
    properties:
      - type: Documentation
        url: https://docs.nupaybusiness.com.br/checkout/docs/openapi/index.html
  - aid: nubank:nupay-auth
    name: NuPay for Business - Authentication API
    description: >-
      OAuth2 app-based authorization, CIBA (Client-Initiated Backchannel
      Authentication) for web flows, OTP validation, and token issuance /
      refresh for NuPay merchant integrations.
    humanURL: https://docs.nupaybusiness.com.br/
    baseURL: https://authentication.spinpay.com.br
    tags:
      - OAuth2
      - CIBA
      - Authentication
    properties:
      - type: Documentation
        url: https://docs.nupaybusiness.com.br/
  - aid: nubank:nupay-beneficiaries
    name: NuPay for Business - Beneficiary Management API
    description: >-
      Register, query, and version final beneficiaries on NuPay orders with
      document validation across CPF, CNPJ, and international identifier
      types.
    humanURL: https://docs.nupaybusiness.com.br/
    baseURL: https://api.spinpay.com.br
    tags:
      - Beneficiaries
      - Compliance
    properties:
      - type: Documentation
        url: https://docs.nupaybusiness.com.br/
  - aid: nubank:nupay-webhook
    name: NuPay for Business - Event Webhooks
    description: >-
      Signed webhook callbacks delivering payment-status and refund-status
      updates to merchant-configured endpoints. Includes signature validation
      headers so merchants can verify NuPay as the sender.
    humanURL: https://docs.nupaybusiness.com.br/
    baseURL: customer-configured
    tags:
      - Webhooks
      - Events
      - Callbacks
    properties:
      - type: Documentation
        url: https://docs.nupaybusiness.com.br/
